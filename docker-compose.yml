# Local-first dev environment. Mirrors the cloud topology:
#   api  <-> mlflow (model registry)   |  add kinesis/kafka later for streaming
services:
  mlflow:
    # Keep this major version in sync with the mlflow client pin in requirements.txt
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/mlflow.db --default-artifact-root /mlruns
    ports: ["5000:5000"]
    volumes: ["mlruns:/mlruns"]

  api:
    build: .
    command: uvicorn triage_stream.api.main:app --host 0.0.0.0 --port 8000
    environment:
      TS_MLFLOW_TRACKING_URI: http://mlflow:5000
    ports: ["8000:8000"]
    depends_on: [mlflow]

volumes:
  mlruns:
